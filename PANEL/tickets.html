<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tickets | Panel Expiriti</title>
<script>!function(){try{document.documentElement.setAttribute("data-theme",localStorage.getItem("expiriti_theme")||"light")}catch(e){}}();</script>
<link rel="stylesheet" href="global.css"><link rel="stylesheet" href="tickets.css"><script type="module" src="theme.js"></script>
</head>
<body>
<header class="topbar"><div class="topbar-inner"><a class="brand" href="dashboard.html"><span class="brand-dot"></span><span>Tickets</span></a><div class="top-actions"><a class="mini" href="dashboard.html">Dashboard</a><button class="mini" data-theme-toggle>🌓 <span data-theme-label>Claro</span></button></div></div></header>

<main class="wrap tickets-page">
<section class="panel tickets-toolbar"><div class="searchbox"><span>🔎</span><input id="tkSearch" placeholder="Buscar ticket o cliente"><button class="btn btn-brand" id="tkRefresh">Actualizar</button></div><div class="toolbar"><button class="btn btn-brand" id="tkNewBtn">Nuevo</button></div></section>

<section class="kanban-board">
<article class="kanban-col"><div class="col-header">Nuevos <span class="col-count" id="count-nuevo">0</span></div><div class="col-body" id="col-nuevo"></div></article>
<article class="kanban-col"><div class="col-header">En proceso <span class="col-count" id="count-proceso">0</span></div><div class="col-body" id="col-proceso"></div></article>
<article class="kanban-col"><div class="col-header">Esperando cliente <span class="col-count" id="count-espera">0</span></div><div class="col-body" id="col-espera"></div></article>
<article class="kanban-col"><div class="col-header">Resueltos <span class="col-count" id="count-resuelto">0</span></div><div class="col-body" id="col-resuelto"></div></article>
</section>
</main>

<div class="overlay" id="tkModal" hidden><div class="modal"><div class="section-head"><div><div class="section-kicker">Alta rápida</div><h3>Nuevo ticket</h3></div><button class="icon-btn" id="tkClose" type="button">✕</button></div><div class="grid"><input class="input" id="tkCliente" placeholder="Cliente ID o nombre"><input class="input" id="tkTitulo" placeholder="Título"><textarea class="area" id="tkDesc" placeholder="Descripción"></textarea><div class="grid-2"><select class="select" id="tkTipo"><option value="soporte">Soporte</option><option value="renovacion">Renovación</option><option value="facturacion">Facturación</option><option value="configuracion">Configuración</option></select><select class="select" id="tkPrioridad"><option value="baja">Baja</option><option value="media" selected>Media</option><option value="alta">Alta</option><option value="urgente">Urgente</option></select></div><div class="actions"><button class="btn btn-brand" id="tkSave">Guardar</button><button class="btn btn-ghost" id="tkCancel">Cancelar</button></div><div class="mut" id="tkStatus">Completa los datos.</div></div></div></div>

<script type="module" src="global.js"></script><script type="module" src="tickets.js"></script>
</body>
</html>
