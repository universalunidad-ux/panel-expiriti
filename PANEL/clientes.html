<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clientes</title><style>body{margin:0;background:#070b12;color:#e8eef6;font-family:Inter,system-ui}._w{max-width:1100px;margin:auto;padding:20px}h2{margin:0 0 14px}._card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:16px}._grid{display:grid;gap:10px}input,textarea{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:#0d1522;color:#fff}textarea{resize:vertical;min-height:44px}button{padding:10px 12px;border:none;border-radius:8px;background:#2dd4bf;color:#000;font-weight:700;cursor:pointer}button:disabled{opacity:.6}ul{list-style:none;padding:0;margin:0}li{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)}a{color:#2dd4bf;text-decoration:none}.rowA{display:flex;justify-content:space-between;gap:10px}.rowB{font-size:14px;color:#b9c4d1;margin-top:6px}.rowC{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.mini{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:13px}.mini:hover{border-color:#2dd4bf;color:#fff}.muted{color:#93a0ae;font-size:13px}.top{display:flex;justify-content:space-between;align-items:center}.stat{font-size:13px;color:#93a0ae}@media(min-width:700px){._grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:699px){.rowA{flex-direction:column}}</style></head><body><div class="_w"><div class="top"><h2>Clientes</h2><div class="stat" id="stat">—</div></div><div class="_card"><div class="_grid"><input id="nombre" placeholder="Nombre"><input id="telefono" placeholder="Teléfono"><input id="correo" placeholder="Correo"><textarea id="comentarios" placeholder="Comentarios"></textarea></div><br><button id="btnGuardar">Guardar cliente</button></div><div class="_card"><div class="_grid"><input id="buscar" placeholder="Buscar"><button id="btnRecargar">Recargar</button><button id="btnLimpiar">Limpiar</button><button id="btnLogout">Salir</button></div></div><div class="_card"><ul id="lista"></ul></div></div>
<script type="module">
import{supabase as s,guardSession,logout,norm,esc,fmt,msg}from"./supabase.js";
const $=q=>document.querySelector(q),nombre=$("#nombre"),telefono=$("#telefono"),correo=$("#correo"),comentarios=$("#comentarios"),lista=$("#lista"),buscar=$("#buscar"),stat=$("#stat"),btn=$("#btnGuardar");let user=null,rows=[];
const tel=v=>(v||"").replace(/[^\d]/g,""),mailOk=v=>!v||/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v),telOk=v=>!v||tel(v).length===10,wa=v=>{const n=tel(v);return n?`https://wa.me/52${n}`:"#"},call=v=>{const n=tel(v);return n?`tel:${n}`:"#"},mail=v=>v?`mailto:${v}`:"#"};
function status(t,o=1){let n=$("#status");if(!n){n=document.createElement("div");n.id="status";n.style.cssText="margin:10px 0;padding:10px;border-radius:10px";document.querySelector("._w").prepend(n)}n.textContent=t||"";n.style.background=o?"rgba(45,212,191,.12)":"rgba(239,68,68,.12)";n.style.display=t?"block":"none"}
function data(){const q=norm(buscar.value);return q?rows.filter(x=>[x.nombre,x.telefono,x.correo,x.comentarios].some(v=>norm(v).includes(q))):rows}
function render(){const d=data();stat.textContent=`${d.length} / ${rows.length}`;lista.innerHTML=d.length?d.map(x=>`<li><div class="rowA"><div><b>${esc(x.nombre||"—")}</b><div class="rowB">${esc(x.telefono||"—")} ${x.correo?"| "+esc(x.correo):""}</div><div class="muted">${fmt(x.fecha_creacion)||""}</div>${x.comentarios?`<div class="rowB">${esc(x.comentarios)}</div>`:""}</div><div class="rowC"><a class="mini" href="cliente.html?id=${x.id}">Ver</a>${x.telefono?`<a class="mini" href="${call(x.telefono)}">Llamar</a><a class="mini" target="_blank" href="${wa(x.telefono)}">WhatsApp</a>`:""}${x.correo?`<a class="mini" href="${mail(x.correo)}">Correo</a>`:""}</div></div></li>`).join(""):'<li class="muted">Sin resultados</li>'}
async function load(){status("Cargando...");const{data,error}=await s.from("clientes").select("*").order("fecha_creacion",{ascending:false});if(error)return status(msg(error),0);rows=data||[];render();status("")}
async function save(){const n=nombre.value.trim(),t=tel(telefono.value),c=correo.value.trim().toLowerCase(),m=comentarios.value.trim();if(!n)return status("Nombre requerido",0);if(!telOk(t))return status("Teléfono inválido",0);if(!mailOk(c))return status("Correo inválido",0);btn.disabled=true;status("Guardando...");const{error}=await s.from("clientes").insert({nombre:n,telefono:t,correo:c,comentarios:m,creado_por:user?.id});btn.disabled=false;if(error)return status(msg(error),0);nombre.value=telefono.value=correo.value=comentarios.value="";await load();status("Guardado")}
$("#btnGuardar").onclick=save;$("#btnRecargar").onclick=load;$("#btnLimpiar").onclick=()=>{buscar.value="";render()};$("#btnLogout").onclick=()=>logout("index.html");buscar.oninput=render;
const auth=await guardSession("index.html");if(!auth)throw 0;user=auth.user;await load();
</script></body></html>
