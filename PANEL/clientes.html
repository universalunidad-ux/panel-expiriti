<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clientes</title><style>body{margin:0;background:#070b12;color:#e8eef6;font-family:Inter,system-ui}._w{max-width:1100px;margin:auto;padding:20px}h2{margin:0 0 14px}._card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:16px}._grid{display:grid;gap:10px}input,textarea{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:#0d1522;color:#fff}button{padding:10px;border:none;border-radius:8px;background:#2dd4bf;color:#000;font-weight:700;cursor:pointer}ul{list-style:none;padding:0;margin:0}li{padding:10px;border-bottom:1px solid rgba(255,255,255,.06)}@media(min-width:600px){._grid{grid-template-columns:repeat(4,1fr)}}</style></head><body><div class="_w"><h2>Clientes</h2><div class="_card"><div class="_grid"><input id="nombre" placeholder="Nombre"><input id="telefono" placeholder="Teléfono"><input id="correo" placeholder="Correo"><textarea id="comentarios" placeholder="Comentarios"></textarea></div><br><button onclick="crearCliente()">Guardar cliente</button></div><div class="_card"><h3>Lista</h3><ul id="lista"></ul></div></div><script type="module">import{createClient}from"https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";const s=createClient("https://ovfmqqqwezfdtgrtkjhf.supabase.co","sb_publishable_2ftu336Kc06w2I2iTwoIpQ_usfSTNG9");const{data}=await s.auth.getSession();if(!data.session)location.href="index.html";window.crearCliente=async()=>{const{data:u}=await s.auth.getUser(),n=nombre.value,t=telefono.value,c=correo.value,m=comentarios.value;const{error}=await s.from("clientes").insert({nombre:n,telefono:t,correo:c,comentarios:m,creado_por:u.user.id});error?alert("Error"): (alert("Guardado"),cargar())};async function cargar(){const{data}=await s.from("clientes").select("*").order("fecha_creacion",{ascending:false});lista.innerHTML="";data.forEach(x=>{const li=document.createElement("li");li.innerHTML=`<b>${x.nombre}</b><br>${x.telefono} | ${x.correo}<br><a href="cliente.html?id=${x.id}">Ver</a>`;lista.appendChild(li)})}cargar();</script></body></html>
