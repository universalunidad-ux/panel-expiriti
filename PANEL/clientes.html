<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clientes</title><style>body{margin:0;background:#070b12;color:#e8eef6;font-family:Inter,system-ui}._w{max-width:1100px;margin:auto;padding:20px}h2{margin:0 0 14px}._card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:16px}._grid{display:grid;gap:10px}input,textarea{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:#0d1522;color:#fff}button{padding:10px;border:none;border-radius:8px;background:#2dd4bf;color:#000;font-weight:700;cursor:pointer}button:disabled{opacity:.6;cursor:not-allowed}ul{list-style:none;padding:0;margin:0}li{padding:10px;border-bottom:1px solid rgba(255,255,255,.06)}a{color:#2dd4bf}@media(min-width:600px){._grid{grid-template-columns:repeat(4,1fr)}}</style></head><body><div class="_w"><h2>Clientes</h2><div class="_card"><div class="_grid"><input id="nombre" placeholder="Nombre"><input id="telefono" placeholder="Teléfono"><input id="correo" placeholder="Correo"><textarea id="comentarios" placeholder="Comentarios"></textarea></div><br><button id="btnGuardar">Guardar cliente</button></div><div class="_card"><h3>Lista</h3><ul id="lista"></ul></div></div>
<script type="module">
import{supabase as s,guardSession,logout}from"./supabase.js";
const $=q=>document.querySelector(q),nombre=$("#nombre"),telefono=$("#telefono"),correo=$("#correo"),comentarios=$("#comentarios"),lista=$("#lista"),btn=$("#btnGuardar");
const wrap=document.querySelector("._w"),tools=document.createElement("div");
tools.className="_card";tools.innerHTML='<div class="_grid"><input id="buscar" placeholder="Buscar por nombre, teléfono o correo"><button id="btnRecargar" type="button">Recargar</button><button id="btnLogout" type="button">Salir</button></div>';wrap.insertBefore(tools,wrap.children[1]);
const buscar=$("#buscar"),btnRecargar=$("#btnRecargar"),btnLogout=$("#btnLogout");
let currentUser=null,rows=[];
const esc=v=>(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])),norm=v=>(v||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim(),mailOk=v=>!v||/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v),telOk=v=>!v||/^\d{10}$/.test(v),fmt=e=>{try{return new Date(e).toLocaleDateString("es-MX")}catch{return"—"}};
function status(msg,ok=true){let n=$("#statusTop");if(!n){n=document.createElement("div");n.id="statusTop";n.style.cssText="margin:0 0 14px;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08)";wrap.insertBefore(n,wrap.children[1])}n.textContent=msg;n.style.background=ok?"rgba(45,212,191,.12)":"rgba(239,68,68,.12)";n.style.color=ok?"#bff7ef":"#fecaca";n.style.display=msg?"block":"none"}
function filtered(){const q=norm(buscar.value);if(!q)return rows;return rows.filter(x=>norm(x.nombre).includes(q)||norm(x.telefono).includes(q)||norm(x.correo).includes(q)||norm(x.comentarios).includes(q))}
function render(){const data=filtered();lista.innerHTML="";if(!data.length){lista.innerHTML='<li>Sin resultados.</li>';return}data.forEach(x=>{const li=document.createElement("li");li.innerHTML=`<b>${esc(x.nombre||"—")}</b><br>${esc(x.telefono||"—")} | ${esc(x.correo||"—")}<br><small>${fmt(x.fecha_creacion)}</small><br><a href="cliente.html?id=${encodeURIComponent(x.id)}">Ver</a>`;lista.appendChild(li)})}
async function cargar(){status("Cargando clientes...",true);const{data,error}=await s.from("clientes").select("id,nombre,telefono,correo,comentarios,fecha_creacion").order("fecha_creacion",{ascending:false});if(error){rows=[];render();status(error.message||"No se pudo cargar.",false);return}rows=data||[];render();status(`Clientes cargados: ${rows.length}`,true)}
async function crearCliente(){const n=nombre.value.trim(),t=telefono.value.trim(),c=correo.value.trim().toLowerCase(),m=comentarios.value.trim();if(!n){status("El nombre es obligatorio.",false);return}if(!telOk(t)){status("Teléfono inválido. Usa 10 dígitos.",false);return}if(!mailOk(c)){status("Correo inválido.",false);return}btn.disabled=true;status("Guardando cliente...",true);const dup=await s.from("clientes").select("id,nombre").ilike("nombre",n).limit(1);if(dup.data?.length){btn.disabled=false;status("Ya existe un cliente con nombre muy similar.",false);return}const{error}=await s.from("clientes").insert({nombre:n,telefono:t,correo:c,comentarios:m,creado_por:currentUser?.id||null});btn.disabled=false;if(error){status(error.message||"Error al guardar.",false);return}nombre.value="";telefono.value="";correo.value="";comentarios.value="";await cargar();status("Cliente guardado correctamente.",true)}
btn.onclick=crearCliente;buscar.oninput=render;btnRecargar.onclick=cargar;btnLogout.onclick=()=>logout("index.html");
const auth=await guardSession("index.html");if(!auth)throw new Error("Sin sesión");currentUser=auth.user;await cargar();
</script>

  
</body></html>
