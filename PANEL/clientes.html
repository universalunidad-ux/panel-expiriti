<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clientes</title><style>body{margin:0;background:#070b12;color:#e8eef6;font-family:Inter,system-ui}._w{max-width:1100px;margin:auto;padding:20px}h2{margin:0 0 14px}._card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:16px}._grid{display:grid;gap:10px}input,textarea{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:#0d1522;color:#fff;min-width:0}textarea{min-height:44px;resize:vertical}button{padding:10px 12px;border:none;border-radius:8px;background:#2dd4bf;color:#000;font-weight:700;cursor:pointer}button:disabled{opacity:.6;cursor:not-allowed}ul{list-style:none;padding:0;margin:0}li{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)}a{color:#2dd4bf;text-decoration:none}.rowA{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.rowB{margin-top:8px;color:#b9c4d1;font-size:14px;line-height:1.45}.rowC{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.mini{display:inline-flex;align-items:center;justify-content:center;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#d7e1ec;font-size:13px;text-decoration:none}.mini:hover{border-color:rgba(45,212,191,.5);color:#fff}.muted{color:#93a0ae;font-size:13px}.topTitle{display:flex;justify-content:space-between;gap:10px;align-items:center}.stat{font-size:13px;color:#93a0ae}@media(min-width:700px){._grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:699px){.rowA{flex-direction:column}.topTitle{flex-direction:column;align-items:flex-start}}</style></head><body><div class="_w"><div class="topTitle"><h2>Clientes</h2><div class="stat" id="topStat">—</div></div><div class="_card"><div class="_grid"><input id="nombre" placeholder="Nombre o razón social"><input id="telefono" placeholder="Teléfono"><input id="correo" placeholder="Correo"><textarea id="comentarios" placeholder="Comentarios"></textarea></div><br><button id="btnGuardar">Guardar cliente</button></div><div class="_card"><h3>Lista</h3><ul id="lista"></ul></div></div>
<script type="module">
import{supabase as s,guardSession,logout,norm,esc,fmt,msg}from"./supabase.js";
const $=q=>document.querySelector(q),nombre=$("#nombre"),telefono=$("#telefono"),correo=$("#correo"),comentarios=$("#comentarios"),lista=$("#lista"),btn=$("#btnGuardar"),wrap=document.querySelector("._w"),topStat=$("#topStat"),tools=document.createElement("div");
tools.className="_card";tools.innerHTML='<div class="_grid"><input id="buscar" placeholder="Buscar por nombre, teléfono, correo o comentarios"><button id="btnRecargar" type="button">Recargar</button><button id="btnLimpiar" type="button">Limpiar</button><button id="btnLogout" type="button">Salir</button></div>';wrap.insertBefore(tools,wrap.children[1]);
const buscar=$("#buscar"),btnRecargar=$("#btnRecargar"),btnLimpiar=$("#btnLimpiar"),btnLogout=$("#btnLogout");let currentUser=null,rows=[];
const mailOk=v=>!v||/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v),telClean=v=>(v||"").replace(/[^\d]/g,""),telOk=v=>!v||telClean(v).length===10,wa=v=>{const n=telClean(v);return n?`https://wa.me/52${n}`:"#"},tel=v=>{const n=telClean(v);return n?`tel:${n}`:"#"},mail=v=>v?`mailto:${v}`:"#"};
function status(txt,ok=1){let n=$("#statusTop");if(!n){n=document.createElement("div");n.id="statusTop";n.style.cssText="margin:0 0 14px;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08)";wrap.insertBefore(n,wrap.children[1])}n.textContent=txt||"";n.style.background=ok?"rgba(45,212,191,.12)":"rgba(239,68,68,.12)";n.style.color=ok?"#bff7ef":"#fecaca";n.style.display=txt?"block":"none"}
function filtered(){const q=norm(buscar.value);return q?rows.filter(x=>[x.nombre,x.telefono,x.correo,x.comentarios].some(v=>norm(v).includes(q))):rows}
function render(){const data=filtered();topStat.textContent=`${data.length} resultado${data.length===1?"":"s"} · ${rows.length} total`;lista.innerHTML="";if(!data.length){lista.innerHTML='<li><div class="muted">Sin resultados.</div></li>';return}data.forEach(x=>{const li=document.createElement("li"),t=telClean(x.telefono),m=(x.correo||"").trim();li.innerHTML=`<div class="rowA"><div><div><b>${esc(x.nombre||"—")}</b></div><div class="rowB">${esc(x.telefono||"—")} ${x.telefono&&x.correo?"|":""} ${esc(x.correo||"—")}</div><div class="muted">${fmt(x.fecha_creacion)||"—"}</div>${x.comentarios?`<div class="rowB">${esc(x.comentarios)}</div>`:""}</div><div class="rowC"><a class="mini" href="cliente.html?id=${encodeURIComponent(x.id)}">Ver</a>${t?`<a class="mini" href="${tel(x.telefono)}">Llamar</a><a class="mini" target="_blank" rel="noopener" href="${wa(x.telefono)}">WhatsApp</a>`:""}${m?`<a class="mini" href="${mail(x.correo)}">Correo</a>`:""}</div></div>`;lista.appendChild(li)})}
async function cargar(){status("Cargando clientes...",1);const{data,error}=await s.from("clientes").select("id,nombre,telefono,correo,comentarios,fecha_creacion").order("fecha_creacion",{ascending:false});if(error){rows=[];render();status(msg(error),0);return}rows=data||[];render();status(`Clientes cargados: ${rows.length}`,1)}
async function crearCliente(){const n=nombre.value.trim(),t=telClean(telefono.value.trim()),c=correo.value.trim().toLowerCase(),m=comentarios.value.trim();if(!n)return status("El nombre es obligatorio.",0);if(!telOk(t))return status("Teléfono inválido. Usa 10 dígitos.",0);if(!mailOk(c))return status("Correo inválido.",0);btn.disabled=true;status("Guardando cliente...",1);const dup=await s.from("clientes").select("id,nombre").ilike("nombre",n).limit(1);if(dup.data?.length){btn.disabled=false;return status("Ya existe un cliente con nombre muy similar.",0)}const{error}=await s.from("clientes").insert({nombre:n,telefono:t,correo:c,comentarios:m,creado_por:currentUser?.id||null});btn.disabled=false;if(error)return status(msg(error),0);nombre.value="";telefono.value="";correo.value="";comentarios.value="";await cargar();status("Cliente guardado correctamente.",1)}
btn.onclick=crearCliente;buscar.oninput=render;btnRecargar.onclick=cargar;btnLimpiar.onclick=()=>{buscar.value="";render()};btnLogout.onclick=()=>logout("index.html");
const auth=await guardSession("index.html");if(!auth)throw new Error("Sin sesión");currentUser=auth.user;await cargar();
</script></body></html>
