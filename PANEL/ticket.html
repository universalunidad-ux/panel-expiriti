<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ticket | Panel Expiriti</title>
<script>!function(){try{document.documentElement.setAttribute("data-theme",localStorage.getItem("expiriti_theme")||"light")}catch(e){}}();</script>
<link rel="stylesheet" href="global.css"><link rel="stylesheet" href="ticket.css"><script type="module" src="theme.js"></script>
</head>
<body>
<header class="topbar"><div class="topbar-inner"><a class="brand" href="tickets.html"><span class="brand-dot"></span><span>Ticket</span></a><div class="top-actions"><a class="mini" href="tickets.html">Volver</a><button class="mini" data-theme-toggle>🌓 <span data-theme-label>Claro</span></button></div></div></header>

<main class="ticket-page wrap">
<aside class="panel ticket-side">
<h2 id="tkTitle">Cargando ticket</h2>
<div class="box"><div class="k">Cliente</div><div class="v small" id="tkClient">—</div></div>
<div class="box"><div class="k">Sistema</div><div class="v small" id="tkSystem">—</div></div>
<div class="box"><div class="k">Estado</div><div class="v small" id="tkState">—</div></div>
<div class="box"><div class="k">Prioridad</div><div class="v small" id="tkPriority">—</div></div>
<div class="actions"><button class="btn" id="copyMagicBtn">🔗 Copiar enlace</button></div>
</aside>

<section class="panel ticket-main">
<div class="log-area" id="logArea"></div>
<div class="editor"><textarea class="area" id="logText" placeholder="Escribe un log interno..."></textarea><div class="actions"><button class="btn btn-brand" id="saveLogBtn">Guardar log</button></div></div>
</section>
</main>

<script type="module" src="global.js"></script><script type="module" src="ticket.js"></script>
</body>
</html>
