<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cliente</title><style>body{margin:0;background:#070b12;color:#e8eef6;font-family:Inter}._w{max-width:900px;margin:auto;padding:20px}._card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:16px}button{padding:10px;border:none;border-radius:8px;background:#2dd4bf;color:#000;font-weight:700;cursor:pointer}</style></head><body><div class="_w"><h2>Cliente</h2><div class="_card"><input type="file" id="file"><br><br><button onclick="subir()">Subir PDF</button></div><div class="_card"><h3>Documentos</h3><ul id="docs"></ul></div></div><script type="module">import{createClient}from"https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";const s=createClient("https://ovfmqqqwezfdtgrtkjhf.supabase.co","sb_publishable_2ftu336Kc06w2I2iTwoIpQ_usfSTNG9");const id=new URLSearchParams(location.search).get("id");window.subir=async()=>{const f=file.files[0];if(!f)return alert("Selecciona archivo");const nombre=Date.now()+"_"+f.name;const{error}=await s.storage.from("documentos").upload(nombre,f);if(error)return alert("Error subida");const{data}=s.storage.from("documentos").getPublicUrl(nombre);await s.from("documentos").insert({cliente_id:id,nombre_archivo:f.name,url_pdf:data.publicUrl});alert("Subido");cargar()};async function cargar(){const{data}=await s.from("documentos").select("*").eq("cliente_id",id);docs.innerHTML="";data.forEach(d=>{const li=document.createElement("li");li.innerHTML=`<a href="${d.url_pdf}" target="_blank">${d.nombre_archivo}</a>`;docs.appendChild(li)})}cargar();</script></body></html>
