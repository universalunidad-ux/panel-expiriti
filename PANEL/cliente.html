<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cliente | Panel Expiriti</title>

<script>!function(){try{document.documentElement.setAttribute("data-theme",localStorage.getItem("expiriti_theme")||"light")}catch(e){}}();</script>

<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="cliente.css">
<script type="module" src="theme.js"></script>
</head>

<body>

<header class="topbar">
<div class="topbar-inner">
<a class="brand" href="dashboard.html"><span class="brand-dot"></span><span>Cliente</span></a>
<div class="top-actions">
<button class="mini" data-theme-toggle>🌓 <span data-theme-label>Claro</span></button>
<a class="mini" href="dashboard.html">Dashboard</a>
</div>
</div>
</header>

<main class="wrap">

<!-- HERO -->
<section class="panel hero">
<div>
<h1 id="clienteNombre">Cliente</h1>
<div class="chips">
<span class="pill" id="badgeEstado">Activo</span>
<span class="pill bad hidden" id="badgeCritico">🔥 Crítico</span>
</div>
</div>

<div class="actions">
<button class="btn btn-brand" id="openTicketBtn">Nuevo ticket</button>
</div>
</section>

<!-- TABS -->
<section class="tabs">
<button class="tab active" data-tab="resumen">Resumen</button>
<button class="tab" data-tab="documentos">Documentos</button>
<button class="tab" data-tab="crm">CRM</button>
<button class="tab" data-tab="accesos">Accesos</button>
<button class="tab" data-tab="bitacora">Bitácora</button>
</section>

<!-- RESUMEN -->
<section class="panel tab-panel" id="panel-resumen">
<div class="grid-3">
<div class="metric"><span class="k">Docs</span><strong id="mDocs">0</strong></div>
<div class="metric"><span class="k">Vencidos</span><strong id="mBad">0</strong></div>
<div class="metric"><span class="k">Tickets</span><strong id="mTickets">0</strong></div>
</div>
</section>

<!-- DOCUMENTOS -->
<section class="panel tab-panel hidden" id="panel-documentos">
<div id="docsList" class="list"></div>
</section>

<!-- CRM -->
<section class="panel tab-panel hidden" id="panel-crm">
<textarea class="area" id="crmNotas" placeholder="Notas del cliente"></textarea>
<button class="btn btn-brand" id="saveCrmBtn">Guardar</button>
</section>

<!-- ACCESOS -->
<section class="panel tab-panel hidden" id="panel-accesos">
<div class="section-head"><h2>Accesos</h2></div>

<div class="grid-2">
<input class="input" id="accUser" placeholder="Usuario">
<input class="input" id="accPass" placeholder="Password">
<input class="input" id="accVps" placeholder="VPS">
<input class="input" id="accAny" placeholder="AnyDesk">
</div>

<div class="actions">
<button class="btn btn-brand" id="saveAccBtn">Guardar</button>
<button class="mini" id="copyUser">Copiar usuario</button>
<button class="mini" id="copyPass">Copiar pass</button>
</div>

<div class="mut" id="accStatus"></div>
</section>

<!-- BITACORA -->
<section class="panel tab-panel hidden" id="panel-bitacora">
<div id="bitList" class="list"></div>
</section>

</main>

<!-- DRAWER TICKET -->
<div class="overlay hidden" id="ticketDrawer">
<div class="modal">
<h3>Nuevo ticket</h3>
<input class="input" id="tTitulo" placeholder="Título">
<textarea class="area" id="tDesc"></textarea>
<button class="btn btn-brand" id="saveTicket">Guardar</button>
</div>
</div>

<script type="module" src="cliente.js"></script>
</body>
</html>
