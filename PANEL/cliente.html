<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<title>Detalle de Cliente | Expiriti</title>
<style>
:root{--bg:#070b12;--card:rgba(255,255,255,.02);--br:rgba(255,255,255,.08);--txt:#e8eef6;--mut:#94a3b8;--brand:#2dd4bf;--warn:#f59e0b;--bad:#ef4444;--ok:#10b981}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,system-ui}
._w{max-width:1120px;margin:auto;padding:20px}
/* Tabs UI */
.tabs{display:flex;gap:16px;border-bottom:1px solid var(--br);margin-bottom:20px;overflow-x:auto}
.tab{padding:12px 16px;color:var(--mut);cursor:pointer;font-weight:700;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--brand);border-color:var(--brand)}
.tab-content{display:none;animation:fadeIn .3s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
/* Componentes */
._card{background:var(--card);border:1px solid var(--br);border-radius:16px;padding:20px;margin-bottom:16px;backdrop-filter:blur(10px)}
.top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
h2,h3{margin:0} .mut{color:var(--mut);font-size:13px}
.grid2,.grid3{display:grid;gap:12px} .grid2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))} .grid3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.box{background:rgba(255,255,255,.02);border:1px solid var(--br);border-radius:12px;padding:16px}
.v{font-size:18px;font-weight:800;margin-top:4px}
.btn{display:inline-flex;align-items:center;padding:10px 16px;border-radius:10px;background:var(--brand);color:#000;font-weight:700;cursor:pointer;border:none;text-decoration:none}
.btn.ghost{background:rgba(255,255,255,.05);color:var(--txt)}
.btn.wa{background:#10b981;color:#fff} /* Botón especial WhatsApp */
.pill{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid var(--br)}
.ok{color:var(--ok);border-color:rgba(16,185,129,.3)} .warn{color:var(--warn);border-color:rgba(245,158,11,.3)} .bad{color:var(--bad);border-color:rgba(239,68,68,.3)}
/* Skeleton Loader 2026 */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.02) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.02) 75%);background-size:400% 100%;animation:loading 1.5s infinite;border-radius:8px;min-height:24px}
@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="_w">
  <div class="top">
    <div><h2 id="cNombre" class="skeleton" style="width:250px;height:32px;margin-bottom:8px"></h2><div class="mut" id="sub">Cargando perfil...</div></div>
    <div style="display:flex;gap:8px"><a class="btn ghost" href="dashboard.html">Volver</a></div>
  </div>

  <div class="_card grid3">
    <div class="box"><div class="mut">Teléfono</div><div class="v skeleton" id="cTelefono" style="width:120px"></div></div>
    <div class="box"><div class="mut">Correo</div><div class="v skeleton" id="cCorreo" style="width:180px"></div></div>
    <div class="box"><div class="mut">Estatus Póliza</div><div class="v skeleton" id="cEstado" style="width:100px"></div></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-target="tab-certs">Certificados</div>
    <div class="tab" data-target="tab-tickets">Tickets de Soporte</div>
    <div class="tab" data-target="tab-crm">CRM & Logs</div>
  </div>

  <div id="tab-certs" class="tab-content active">
    <div class="_card">
      <div class="top"><h3>Sistemas CONTPAQi</h3><button class="btn ghost" id="btnUploadModal">+ Subir PDF</button></div>
      <div id="docsList" style="display:grid;gap:10px">
        <div class="skeleton" style="height:60px"></div>
        <div class="skeleton" style="height:60px"></div>
      </div>
    </div>
  </div>

  <div id="tab-tickets" class="tab-content">
    <div class="_card">
      <div class="top"><h3>Historial de Casos</h3><button class="btn">+ Nuevo Ticket</button></div>
      <div id="ticketsList" class="mut">Cargando tickets...</div>
    </div>
  </div>

  <div id="tab-crm" class="tab-content">
    <div class="_card grid2">
      <div>
        <div class="mut" style="margin-bottom:8px">Notas internas</div>
        <textarea id="cComentarios" class="skeleton" style="width:100%;height:100px;background:var(--bg);border:1px solid var(--br);color:var(--txt);padding:12px;border-radius:12px"></textarea>
      </div>
      <div><button class="btn" id="btnSaveCRM" style="margin-top:28px">Guardar Notas</button></div>
    </div>
  </div>
</div>

<script type="module">
  // Simulador de Supabase y Lógica
  const $ = q => document.querySelector(q);
  const $$ = q => document.querySelectorAll(q);

  // Lógica de Pestañas (Tabs)
  $$('.tab').forEach(tab => {
    tab.onclick = () => {
      $$('.tab').forEach(t => t.classList.remove('active'));
      $$('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      $(`#${tab.dataset.target}`).classList.add('active');
    };
  });

  // Simulador de Carga (Skeletons out)
  setTimeout(() => {
    const cliente = { nombre: "AUNA SEGUROS", tel: "5512345678", correo: "contacto@auna.mx", estado: "Vigente" };
    
    // Quitar skeletons
    $('#cNombre').classList.remove('skeleton'); $('#cNombre').textContent = cliente.nombre;
    $('#cTelefono').classList.remove('skeleton'); $('#cTelefono').textContent = cliente.tel;
    $('#cCorreo').classList.remove('skeleton'); $('#cCorreo').textContent = cliente.correo;
    $('#cEstado').classList.remove('skeleton'); $('#cEstado').innerHTML = `<span class="pill ok">Póliza Activa</span>`;
    $('#cComentarios').classList.remove('skeleton');

    // Render Certificados con Botón Mágico de WA
    const docVence = "2026-04-14"; // Vence en 10 días
    const msgWA = encodeURIComponent(`Hola, tu sistema CONTPAQi Comercial Premium vence el ${docVence}. ¿Te genero la cotización de renovación?`);
    
    $('#docsList').innerHTML = `
      <div class="box" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:800">CONTPAQi Comercial Premium</div>
          <div class="mut">Serie: X19283 · Vence: 14 Abr 2026</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="pill warn">Vence pronto</span>
          <a href="https://wa.me/52${cliente.tel}?text=${msgWA}" target="_blank" class="btn wa">Generar WA</a>
        </div>
      </div>
    `;
  }, 1000);
</script>
</body>
</html>
