<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Panel Expiriti</title><style>:root{--bg:#070b12;--bg2:#0b1220;--card:rgba(255,255,255,.04);--line:rgba(255,255,255,.09);--txt:#e8eef6;--mut:#9aa7b7;--brand:#2dd4bf;--brand2:#60a5fa;--danger:#f87171;--ok:#22c55e;--radius:18px;--shadow:0 24px 70px rgba(0,0,0,.35)}*{box-sizing:border-box}html,body{margin:0;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--txt);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}a{color:inherit;text-decoration:none}button,input{font:inherit}body{min-height:100vh}.wrap{max-width:1240px;margin:0 auto;padding:18px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.brand{font-weight:900;letter-spacing:.02em;font-size:clamp(20px,2vw,28px)}.topActions{display:flex;gap:10px;align-items:center}.btn{border:0;border-radius:12px;padding:11px 14px;font-weight:800;cursor:pointer;transition:.18s transform ease,.18s opacity ease}.btn:active{transform:scale(.98)}.btnBrand{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#051018}.btnGhost{background:rgba(255,255,255,.05);color:var(--txt);border:1px solid var(--line)}.hero{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:16px;margin-bottom:16px}.searchRow{display:grid;grid-template-columns:1fr auto;gap:10px}.searchBox{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:#0d1522;border-radius:16px;padding:12px 14px;min-height:52px}.searchBox input{flex:1;background:transparent;border:0;outline:none;color:var(--txt);font-size:15px}.searchBox input::placeholder{color:var(--mut)}.hint{margin:10px 2px 0;color:var(--mut);font-size:13px}.systems{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:16px}@media(min-wi dal{width:min(760px,100%);background:linear-gradient(180deg,#0d1522,#0a111b);border:1px solid var(--line);border-radius:24px;box-shadow:0 35px 100px rgba(0,0,0,.5);overflow:hidden}.modalHead{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}.modalTitle{font-weight:900;font-size:18px}.close{background:transparent;border:0;color:var(--mut);font-size:24px;cursor:pointer;line-height:1}.modalBody{padding:18px}.grid{display:grid;gap:12px}.field{display:grid;gap:7px}.label{font-size:13px;color:var(--mut);font-weight:700}.input,.drop{width:100%;border:1px solid var(--line);background:#0d1522;color:var(--txt);border-radius:14px;padding:12px 13px;outline:none}.input::placeholder{color:var(--mut)}.row2{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:760px){.row2{grid-template-columns:1fr auto}}.check{display:flex;align-items:center;gap:10px;padding:0 2px}.drop{min-height:142px;display:flex;align-items:center;justify-content:center;text-align:center;border-style:dashed;color:var(--mut);cursor:pointer}.drop.drag{border-color:rgba(45,212,191,.6);background:rgba(45,212,191,.08);color:#dffaf6}.fileMeta{font-size:12px;color:var(--mut)}.actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;flex-wrap:wrap}.status{font-size:13px;margin-top:8px;color:var(--mut)}.status.ok{color:#7ee7b8}.status.err{color:#fca5a5}</style></head><body><div class="wrap"><div class="top"><div class="brand">Panel Expiriti</div><div class="topActions"><button class="btn btnBrand" id="addBtn">Agregar PDF</button><button class="btn btnGhost" id="logoutBtn">Salir</button></div></div><section class="hero"><div class="searchRow"><div class="searchBox"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/></svg><input id="searchInput" placeholder="Razón social / nombre" autocomplete="off"></div><button class="btn btnBrand" id="searchBtn">Buscar</button></div><div class="hint">Busca por razón social / nombre y filtra también por sistema desde los logos.</div><div class="systems" id="systems"></div></section><section class="sec"><div class="secHead"><div><div class="secTitle">Resultados</div><div class="count" id="countLabel">0 resultados</div></div></div><div class="results" id="results"></div></section></div><div class="overlay" id="overlay"><div class="modal"><div class="modalHead"><div class="modalTitle">Agregar certificado PDF</div><button class="close" id="closeModal" aria-label="Cerrar">×</button></div><div class="modalBody"><div class="grid"><div class="field"><label class="label">Razón social / nombre</label><input id="rsInput" class="input" placeholder="Razón social / nombre"></div><div class="row2"><label class="check"><input type="checkbox" id="isNew"> <span>Nuevo</span></label><div class="fileMeta" id="fileName">Ningún archivo seleccionado</div></div><div class="field"><label class="label">Archivo PDF</label><div class="drop" id="dropZone">Arrastra tu PDF aquí o haz clic para seleccionarlo</div><input id="fileInput" type="file" accept="application/pdf" hidden></div><div class="actions"><button class="btn btnGhost" id="cancelBtn">Cancelar</button><button class="btn btnBrand" id="uploadBtn">Subir</button></div><div class="status" id="statusTxt"></div></div></div></div></div><script type="module">import{createClient}from"https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";const s=createClient("https://ovfmqqqwezfdtgrtkjhf.supabase.co","sb_publishable_2ftu336Kc06w2I2iTwoIpQ_usfSTNG9"),SYSTEMS=[{name:"CONTPAQi Contabilidad",keyword:"contabilidad",logo:"IMG/contabilidad.webp"},{name:"CONTPAQi Bancos",keyword:"bancos",logo:"IMG/bancos.webp"},{name:"CONTPAQi Nóminas",keyword:"nominas",logo:"IMG/nominas.webp"},{name:"CONTPAQi XML en Línea",keyword:"xml",logo:"IMG/xml.webp"},{name:"CONTPAQi Comercial START",keyword:"comercial start",logo:"IMG/comercialstart.webp"},{name:"CONTPAQi Comercial PRO",keyword:"comercial pro",logo:"IMG/comercialpro.webp"},{name:"CONTPAQi Comercial PREMIUM",keyword:"comercial premium",logo:"IMG/comercialpremium.webp"},{name:"CONTPAQi Factura Electrónica",keyword:"factura",logo:"IMG/factura.webp"}],$=e=>document.querySelector(e),results=$("#results"),countLabel=$("#countLabel"),overlay=$("#overlay"),addBtn=$("#addBtn"),closeModal=$("#closeModal"),cancelBtn=$("#cancelBtn"),uploadBtn=$("#uploadBtn"),logoutBtn=$("#logoutBtn"),dropZone=$("#dropZone"),fileInput=$("#fileInput"),fileName=$("#fileName"),statusTxt=$("#statusTxt"),rsInput=$("#rsInput"),isNew=$("#isNew"),searchInput=$("#searchInput"),searchBtn=$("#searchBtn"),systems=$("#systems");let currentSystem="",pickedFile=null,cache=[];const detectSystem=e=>{const t=(e||"").toLowerCase();for(const a of SYSTEMS){const k=a.keyword.toLowerCase();if(t.includes(k))return a.name;if(a.name.toLowerCase().replaceAll("contpaqi ","").includes(t))return a.name}if(t.includes("nomina"))return"CONTPAQi Nóminas";if(t.includes("comercial premium"))return"CONTPAQi Comercial PREMIUM";if(t.includes("comercial pro"))return"CONTPAQi Comercial PRO";if(t.includes("comercial start"))return"CONTPAQi Comercial START";return""},escapeHtml=e=>(e??"").replace(/[&<>"']/g,e=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[e]));async function protect(){const{data}=await s.auth.getSession();data.session||(location.href="index.html")}function renderSystems(){systems.innerHTML="";SYSTEMS.forEach(sys=>{const el=document.createElement("button");el.className="sys"+(currentSystem===sys.name?" active":"");el.innerHTML=`<img src="${sys.logo}" alt="${sys.name}" loading="lazy" decoding="async">`;el.title=sys.name;el.onclick=()=>{currentSystem=currentSystem===sys.name?"":sys.name;renderSystems();renderResults()};systems.appendChild(el)})}async function loadData(){const{data,error}=await s.from("documentos").select("id,cliente_id,nombre_archivo,url_pdf,sistema,fecha_s nt=f?f.name:"Ningún archivo seleccionado"}async function resolveClientId(nombre,nuevo){const trimmed=nombre.trim();if(!trimmed)return null;const{data:existing}=await s.from("clientes").select("id,nombre").ilike("nombre",trimmed).limit(1);if(existing&&existing.length)return existing[0].id;if(!nuevo)return null;const{data:userData}=await s.auth.getUser();const{data, error}=await s.from("clientes").insert({nombre:trimmed,creado_por:userData.user.id}).select("id").single();if(error)return null;return data.id}async function uploadFlow(){const nombre=rsInput.value.trim();if(!nombre){statusTxt.className="status err";statusTxt.textContent="Captura Razón social / nombre.";return}if(!pickedFile){statusTxt.className="status err";statusTxt.textContent="Selecciona o arrastra un PDF.";return}if(pickedFile.type&&pickedFile.type!=="application/pdf"){statusTxt.className="status err";statusTxt.textContent="Solo se permite PDF.";return}uploadBtn.disabled=!0;uploadBtn.style.opacity=.65;statusTxt.className="status";statusTxt.textContent="Subiendo...";try{const clientId=await resolveClientId(nombre,isNew.checked);if(!clientId){statusTxt.className="status err";statusTxt.textContent='Ese cliente no existe. Marca "Nuevo" para crearlo.';return}const safeName=pickedFile.name.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"_").replace(/[^a-zA-Z0-9._-]/g,"");const storagePath=`${clientId}/${Date.now()}_${safeName}`;const{error:upErr}=await s.storage.from("certificados").upload(storagePath,pickedFile,{upsert:!1,contentType:"application/pdf"});if(upErr){statusTxt.className="status err";statusTxt.textContent="No se pudo subir el PDF.";return}const sistema=detectSystem(pickedFile.name);const{error:dbErr}=await s.from("documentos").insert({cliente_id:clientId,nombre_archivo:pickedFile.name,url_pdf:storagePath,sistema});if(dbErr){statusTxt.className="status err";statusTxt.textContent="Subió el archivo, pero falló al guardarlo en base.";return}statusTxt.className="status ok";statusTxt.textContent="PDF subido correctamente.";searchInput.value=nombre;setTimeout(()=>{closeModalFn();loadData()},650)}finally{uploadBtn.disabled=!1;uploadBtn.style.opacity=1}}addBtn.onclick=openModal;closeModal.onclick=closeModalFn;cancelBtn.onclick=closeModalFn;overlay.addEventListener("click",e=>{e.target===overlay&&closeModalFn()});logoutBtn.onclick=async()=>{await s.auth.signOut();location.href="index.html"};searchBtn.onclick=renderResults;searchInput.addEventListener("input",renderResults);searchInput.addEventListener("keydown",e=>{"Enter"===e.key&&renderResults()});dropZone.onclick=()=>fileInput.click();fileInput.onchange=e=>setPickedFile(e.target.files?.[0]||null);["dragenter","dragover"].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();dropZone.classList.add("drag")}));["dragleave","drop"].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();dropZone.classList.remove("drag")}));dropZone.addEventListener("drop",e=>setPickedFile(e.dataTransfer.files?.[0]||null));uploadBtn.onclick=uploadFlow;await protect();renderSystems();await loadData();</script></body></html>
