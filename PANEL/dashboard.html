<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><link rel="stylesheet" href="styles.css"><style>
:root{--bg:#070b12;--panel:#0f1724;--line:rgba(255,255,255,.08);--text:#e8eef6;--mut:#94a3b8;--brand:#2dd4bf;--warn:#f59e0b;--danger:#ef4444;--ok:#22c55e}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}.topbar{position:sticky;top:0;z-index:20;background:rgba(7,11,18,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.topbar-inner{max-width:1200px;margin:auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-weight:900;font-size:20px}.top-actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#121b2a;color:var(--text);padding:10px 14px;border-radius:12px;text-decoration:none;cursor:pointer}.btn-brand{background:var(--brand);color:#04110e;border:none;font-weight:800}.wrap{max-width:1200px;margin:auto;padding:18px}.grid-kpi{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px}.kpi-label{font-size:13px;color:var(--mut);margin-bottom:8px}.kpi-value{font-size:30px;font-weight:900;line-height:1}.kpi-sub{margin-top:8px;color:var(--mut);font-size:12px}.sections{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-top:14px}.stack{display:grid;gap:14px}.section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.section-title{font-size:18px;font-weight:900}.count{font-size:13px;color:var(--mut)}.list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.02)}.item-title{font-weight:800}.item-meta{font-size:13px;color:var(--mut);margin-top:4px;line-height:1.4}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.tag{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid var(--line);background:rgba(255,255,255,.03)}.tag.ok{color:#86efac}.tag.warn{color:#fcd34d}.tag.err{color:#fca5a5}.empty{padding:18px;border:1px dashed var(--line);border-radius:14px;color:var(--mut)}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.input,.select{background:#0b1220;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px}.table{display:grid;gap:10px}.row{display:grid;grid-template-columns:1.2fr .9fr .7fr .6fr;gap:10px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.02)}.th{font-size:12px;color:var(--mut);font-weight:800;text-transform:uppercase;letter-spacing:.04em}.mut{color:var(--mut)}@media(max-width:1100px){.grid-kpi{grid-template-columns:repeat(3,1fr)}.sections{grid-template-columns:1fr}}@media(max-width:780px){.grid-kpi{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.topbar-inner{align-items:flex-start;flex-direction:column}}
</style></head><body>
<header class="topbar"><div class="topbar-inner"><div class="brand">Dashboard interno</div><div class="top-actions"><a class="btn" href="clientes.html">Clientes</a><a class="btn" href="cliente.html">Detalle cliente</a><button class="btn btn-brand" id="refreshBtn">Actualizar</button></div></div></header>
<main class="wrap">
  <div class="toolbar">
    <input class="input" id="searchInput" placeholder="Buscar cliente o archivo">
    <select class="select" id="statusFilter">
      <option value="">Todos los estados</option>
      <option value="vigente">Vigente</option>
      <option value="por_vencer">Por vencer</option>
      <option value="vencido">Vencido</option>
      <option value="sin_vigencia">Sin vigencia</option>
    </select>
  </div>

  <section class="grid-kpi">
    <article class="card"><div class="kpi-label">Clientes</div><div class="kpi-value" id="kpiClientes">0</div><div class="kpi-sub">Total registrados</div></article>
    <article class="card"><div class="kpi-label">PDFs activos</div><div class="kpi-value" id="kpiDocs">0</div><div class="kpi-sub">No eliminados</div></article>
    <article class="card"><div class="kpi-label">Vigentes</div><div class="kpi-value" id="kpiVigentes">0</div><div class="kpi-sub">Más de 30 días</div></article>
    <article class="card"><div class="kpi-label">Por vencer</div><div class="kpi-value" id="kpiPorVencer">0</div><div class="kpi-sub">0 a 30 días</div></article>
    <article class="card"><div class="kpi-label">Vencidos</div><div class="kpi-value" id="kpiVencidos">0</div><div class="kpi-sub">Fecha pasada</div></article>
  </section>

  <section class="sections">
    <div class="stack">
      <article class="card">
        <div class="section-head"><div><div class="section-title">Últimos documentos</div><div class="count" id="recentCount">0 elementos</div></div></div>
        <div class="list" id="recentList"></div>
      </article>

      <article class="card">
        <div class="section-head"><div><div class="section-title">Actividad reciente</div><div class="count" id="activityCount">0 movimientos</div></div></div>
        <div class="list" id="activityList"></div>
      </article>
    </div>

    <div class="stack">
      <article class="card">
        <div class="section-head"><div><div class="section-title">Por vencer</div><div class="count" id="dueCount">0 documentos</div></div></div>
        <div class="table">
          <div class="row th"><div>Archivo / Cliente</div><div>Sistema</div><div>Fin</div><div>Estado</div></div>
          <div id="dueList"></div>
        </div>
      </article>
    </div>
  </section>
</main>

<script type="module">
import{supabase as s,guardSession}from"./supabase.js";

const $=q=>document.querySelector(q),
kpiClientes=$("#kpiClientes"),kpiDocs=$("#kpiDocs"),kpiVigentes=$("#kpiVigentes"),
kpiPorVencer=$("#kpiPorVencer"),kpiVencidos=$("#kpiVencidos"),
recentList=$("#recentList"),recentCount=$("#recentCount"),
activityList=$("#activityList"),activityCount=$("#activityCount"),
dueList=$("#dueList"),dueCount=$("#dueCount"),
refreshBtn=$("#refreshBtn"),searchInput=$("#searchInput"),statusFilter=$("#statusFilter");

let docs=[],logs=[],clientes=[];

const esc=v=>(v??"").toString().replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])),
norm=v=>(v||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim(),
fmt=v=>{if(!v)return"—";try{return new Date(v).toLocaleDateString("es-MX")}catch{return"—"}},
getErr=e=>e?.message||e?.error_description||e?.details||"Error";

function estado(fin){
  if(!fin)return"sin_vigencia";
  const d=Math.ceil((new Date(fin)-new Date())/86400000);
  return d<0?"vencido":d<=30?"por_vencer":"vigente";
}
function badgeClass(st){return st==="vigente"?"ok":st==="por_vencer"?"warn":st==="vencido"?"err":""}
function badgeText(st){return st==="vigente"?"Vigente":st==="por_vencer"?"Por vencer":st==="vencido"?"Vencido":"Sin vigencia"}

async function protect(){
  const auth=await guardSession("index.html");
  if(!auth)throw new Error("Sin sesión");
}

async function loadKPIs(){
  const [{count:clientesCount,error:e1},{count:docsCount,error:e2},{count:vigCount,error:e3},{count:pvCount,error:e4},{count:venCount,error:e5}]=await Promise.all([
    s.from("clientes").select("*",{count:"exact",head:true}),
    s.from("documentos").select("*",{count:"exact",head:true}).eq("eliminado",false),
    s.from("documentos_estado_view").select("*",{count:"exact",head:true}).eq("estado_vigencia_calc","vigente"),
    s.from("documentos_estado_view").select("*",{count:"exact",head:true}).eq("estado_vigencia_calc","por_vencer"),
    s.from("documentos_estado_view").select("*",{count:"exact",head:true}).eq("estado_vigencia_calc","vencido")
  ]).then(r=>r.map(x=>({count:x.count||0,error:x.error})));

  if(e1||e2||e3||e4||e5)console.error(e1||e2||e3||e4||e5);

  kpiClientes.textContent=clientesCount||0;
  kpiDocs.textContent=docsCount||0;
  kpiVigentes.textContent=vigCount||0;
  kpiPorVencer.textContent=pvCount||0;
  kpiVencidos.textContent=venCount||0;
}

async function loadDocs(){
  const {data,error}=await s.from("documentos").select("id,cliente_id,nombre_archivo,sistema,fecha_subida,fin_vigencia,eliminado,clientes(nombre)").eq("eliminado",false).order("fecha_subida",{ascending:false}).limit(100);
  if(error){
    recentList.innerHTML=`<div class="empty">Error cargando documentos: ${esc(getErr(error))}</div>`;
    dueList.innerHTML="";
    return;
  }
  docs=(data||[]).map(x=>({...x,cliente_nombre:x.clientes?.nombre||""}));
  renderRecent();
  renderDue();
}

async function loadLogs(){
  const {data,error}=await s.from("bitacora_view").select("*").limit(20);
  if(error){
    activityList.innerHTML=`<div class="empty">Error cargando actividad: ${esc(getErr(error))}</div>`;
    return;
  }
  logs=data||[];
  renderActivity();
}

function filteredDocs(){
  const q=norm(searchInput.value),st=statusFilter.value;
  return docs.filter(x=>{
    const okQ=!q||norm(x.nombre_archivo).includes(q)||norm(x.cliente_nombre).includes(q)||norm(x.sistema).includes(q);
    const est=estado(x.fin_vigencia);
    const okSt=!st||est===st;
    return okQ&&okSt;
  });
}

function renderRecent(){
  const rows=filteredDocs().slice(0,12);
  recentCount.textContent=`${rows.length} elementos`;
  if(!rows.length){recentList.innerHTML='<div class="empty">Sin resultados.</div>';return}
  recentList.innerHTML=rows.map(x=>{
    const st=estado(x.fin_vigencia);
    return `<article class="item"><div class="item-title">${esc(x.nombre_archivo||"PDF")}</div><div class="item-meta">${esc(x.cliente_nombre||"Sin cliente")} · ${esc(x.sistema||"Sin sistema")} · Subido: ${fmt(x.fecha_subida)}${x.fin_vigencia?` · Fin: ${fmt(x.fin_vigencia)}`:""}</div><div class="tags"><span class="tag ${badgeClass(st)}">${badgeText(st)}</span><a class="btn" href="cliente.html?id=${x.cliente_id}">Ver cliente</a></div></article>`;
  }).join("");
}

function renderDue(){
  const rows=filteredDocs().filter(x=>["por_vencer","vencido"].includes(estado(x.fin_vigencia))).sort((a,b)=>{
    const da=a.fin_vigencia?new Date(a.fin_vigencia).getTime():0,db=b.fin_vigencia?new Date(b.fin_vigencia).getTime():0;
    return da-db;
  }).slice(0,20);
  dueCount.textContent=`${rows.length} documentos`;
  if(!rows.length){dueList.innerHTML='<div class="empty">Sin documentos por vencer.</div>';return}
  dueList.innerHTML=rows.map(x=>{
    const st=estado(x.fin_vigencia);
    return `<div class="row"><div><div><strong>${esc(x.nombre_archivo||"PDF")}</strong></div><div class="mut">${esc(x.cliente_nombre||"Sin cliente")}</div></div><div>${esc(x.sistema||"—")}</div><div>${fmt(x.fin_vigencia)}</div><div><span class="tag ${badgeClass(st)}">${badgeText(st)}</span></div></div>`;
  }).join("");
}

function renderActivity(){
  activityCount.textContent=`${logs.length} movimientos`;
  if(!logs.length){activityList.innerHTML='<div class="empty">Sin actividad reciente.</div>';return}
  activityList.innerHTML=logs.map(l=>`<article class="item"><div class="item-title">${esc(l.accion||"Acción")}</div><div class="item-meta">${esc(l.usuario_nombre||"Usuario")} · ${esc(l.usuario_rol||"rol")} · ${fmt(l.fecha)}</div>${l.detalle?`<div class="item-meta">${esc(JSON.stringify(l.detalle))}</div>`:""}</article>`).join("");
}

function bindUI(){
  refreshBtn.onclick=init;
  searchInput.addEventListener("input",()=>{renderRecent();renderDue()});
  statusFilter.onchange=()=>{renderRecent();renderDue()};
}

async function init(){
  await loadKPIs();
  await Promise.all([loadDocs(),loadLogs()]);
}

bindUI();
await protect();
await init();
</script>
</body></html>
