<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panel Expiriti</title>
  <style>
    :root{
      --bg:#f6f8fb;--panel:#fff;--text:#0f172a;--muted:#64748b;--line:rgba(15,23,42,.10);
      --brand:#0f766e;--brand2:#14b8a6;--danger:#dc2626;--shadow:0 20px 60px rgba(15,23,42,.10)
    }
    html[data-theme="dark"]{
      --bg:#070b12;--panel:#0f1724;--text:#e8eef6;--muted:#94a3b8;--line:rgba(255,255,255,.08);
      --brand:#2dd4bf;--brand2:#60a5fa;--danger:#ef4444;--shadow:0 20px 60px rgba(0,0,0,.28)
    }
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:Inter,system-ui;color:var(--text);padding:16px}
    ._c{width:min(100%,380px);padding:24px;border-radius:18px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow)}
    h2{margin:0 0 8px;font-size:22px}._s{margin:0 0 16px;color:var(--muted);font-size:13px;line-height:1.45}
    ._i{width:100%;padding:12px 13px;border-radius:12px;border:1px solid var(--line);background:transparent;color:var(--text);margin-bottom:10px;font-size:14px}
    ._i:focus{outline:none;border-color:var(--brand)}
    ._b{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#041018;font-weight:800;cursor:pointer;font-size:14px}
    ._b:active{transform:scale(.98)}
    ._l{margin-top:12px;text-align:center;font-size:13px;color:var(--brand);cursor:pointer;font-weight:700}
    ._e{color:var(--danger);font-size:12px;margin-top:10px;display:none;line-height:1.4}
    ._ok{color:var(--brand);font-size:12px;margin-top:10px;display:none;line-height:1.4}
  </style>
</head>
<body>
  <div class="_c">
    <h2>Panel Expiriti</h2>
    <p class="_s">Acceso al panel interno de certificados y clientes.</p>

    <input id="email" class="_i" placeholder="Correo">
    <input id="password" class="_i" type="password" placeholder="Contraseña">
    <button class="_b" id="loginBtn">Entrar</button>

    <div class="_l" id="forgotBtn">¿Olvidaste tu contraseña?</div>
    <div id="ok" class="_ok"></div>
    <div id="err" class="_e"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase=createClient(
      "https://ovfmqqqwezfdtgrtkjhf.supabase.co",
      "sb_publishable_2ftu336Kc06w2I2iTwoIpQ_usfSTNG9",
      {auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}}
    );

    const $=id=>document.getElementById(id);
    const showErr=txt=>{ $("err").textContent=txt||"Error"; $("err").style.display="block"; $("ok").style.display="none"; };
    const showOk=txt=>{ $("ok").textContent=txt||""; $("ok").style.display="block"; $("err").style.display="none"; };

    document.documentElement.setAttribute("data-theme","light");

    const { data:{ session } } = await supabase.auth.getSession();
    if(session && !location.hash.includes("type=recovery")) location.href="dashboard.html";

    $("loginBtn").onclick=async()=>{
      $("err").style.display="none"; $("ok").style.display="none";
      const email=$("email").value.trim(),password=$("password").value;
      if(!email || !password) return showErr("Escribe tu correo y contraseña.");
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if(error) return showErr(error.message);
      localStorage.setItem("expiriti_login_ts",String(Date.now()));
      location.href="dashboard.html";
    };

    $("forgotBtn").onclick=async()=>{
      $("err").style.display="none"; $("ok").style.display="none";
      const email=$("email").value.trim();
      if(!email) return showErr("Escribe tu correo primero.");
      const { error } = await supabase.auth.resetPasswordForEmail(email,{
        redirectTo:"https://universalunidad-ux.github.io/panel-expiriti/PANEL/"
      });
      if(error) return showErr(error.message);
      showOk("Te envié un correo para restablecer tu contraseña.");
    };

    supabase.auth.onAuthStateChange(async(event)=>{
      if(event==="PASSWORD_RECOVERY"){
        const newPass=prompt("Escribe tu nueva contraseña:");
        if(!newPass || newPass.length<8) return showErr("La nueva contraseña debe tener al menos 8 caracteres.");
        const { error } = await supabase.auth.updateUser({ password:newPass });
        if(error) return showErr(error.message);
        showOk("Contraseña actualizada. Ahora puedes iniciar sesión.");
        history.replaceState({},document.title,location.pathname);
      }
    });
  </script>
</body>
</html>
