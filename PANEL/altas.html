<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Altas | Panel Expiriti</title>
<script>!function(){try{document.documentElement.setAttribute("data-theme",localStorage.getItem("expiriti_theme")||"light")}catch(e){}}();</script>
<link rel="stylesheet" href="global.css"><link rel="stylesheet" href="altas.css"><script type="module" src="theme.js"></script>
</head>
<body>
<header class="topbar"><div class="topbar-inner"><a class="brand" href="dashboard.html"><span class="brand-dot"></span><span>Altas</span></a><div class="top-actions"><a class="mini" href="dashboard.html">Dashboard</a><button class="mini" data-theme-toggle>🌓 <span data-theme-label>Claro</span></button></div></div></header>

<main class="wrap altas-page">
<section class="panel altas-hero"><div><div class="section-kicker">Revisión interna</div><h1>Solicitudes de alta</h1><p class="mut">Aprueba, rechaza o convierte solicitudes en clientes reales sin fricción operativa.</p></div><div class="grid-3 altas-kpis"><div class="metric"><span class="k">Total</span><strong class="v" id="kTotal">0</strong></div><div class="metric"><span class="k">Pendientes</span><strong class="v warn" id="kPend">0</strong></div><div class="metric"><span class="k">Aprobadas</span><strong class="v ok" id="kAprob">0</strong></div></div></section>

<section class="panel altas-toolbar"><div class="searchbox"><span>🔎</span><input id="q" placeholder="Buscar por nombre, correo, teléfono o estatus"></div><div class="toolbar"><select class="select" id="fStatus"><option value="">Todos</option><option value="pendiente">Pendiente</option><option value="aprobada">Aprobada</option><option value="rechazada">Rechazada</option></select><button class="btn btn-ghost" id="refreshBtn">Actualizar</button></div></section>

<section class="list" id="list"></section>
</main>

<div class="overlay" id="detailModal" hidden><div class="modal"><div class="section-head"><div><div class="section-kicker">Solicitud</div><h3 id="dTitle">Detalle</h3></div><button class="icon-btn" id="closeDetail">✕</button></div><div class="grid" id="detailBody"></div><div class="actions"><button class="btn btn-brand" id="approveBtn">Aprobar</button><button class="btn btn-ghost" id="rejectBtn">Rechazar</button></div><div class="mut" id="detailStatus">Listo.</div></div></div>

<script type="module" src="global.js"></script><script type="module" src="altas.js"></script>
</body>
</html>
